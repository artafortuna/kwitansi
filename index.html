<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kwitansi Pro - Arta Fortuna</title>
    
    <!-- Konfigurasi PWA & Favicon -->
    <meta name="theme-color" content="#f4f7f6">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">

    <!-- Library untuk mengubah pratinjau menjadi Gambar HD -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* --- PENYESUAIAN GLOBAL & MOBILE RESPONSIVE --- */
        * {
            box-sizing: border-box; /* Mencegah elemen meluber dari layar */
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            padding-bottom: 80px; /* Memberi ruang agar konten tidak tertutup footer */
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 1400px; /* Batas maksimal di layar PC besar */
            margin: 0 auto;
        }
        
        /* Area Kiri (Form & Riwayat) */
        .left-panel {
            flex: 1;
            min-width: 320px;
            max-width: 100%; /* Diubah ke 100% agar responsif penuhi layar HP */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* Bayangan lebih halus/profesional */
            position: relative;
        }
        .form-section h2 { margin-top: 0; display: flex; justify-content: space-between; align-items: center;}
        
        .btn-clear-all {
            background: #ffc107; color: #212529; border: none; padding: 8px 14px;
            border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold;
            transition: all 0.2s ease;
        }
        .btn-clear-all:hover { background: #e0a800; transform: translateY(-1px); }

        .form-section form { display: flex; flex-direction: column; gap: 14px; }
        .form-section label { font-weight: 600; font-size: 14px; color: #444; }
        .form-section input, .form-section textarea {
            padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; font-family: inherit; resize: vertical;
            width: 100%; transition: border-color 0.3s, box-shadow 0.3s;
        }
        /* Efek profesional saat form di-klik/fokus */
        .form-section input:focus, .form-section textarea:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
        }
        
        .signature-container {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            border: 1px solid #d1d5db; padding: 15px; border-radius: 6px; background: #fafafa;
        }
        #canvasInput {
            border: 2px dashed #bbb; background: white; cursor: crosshair; touch-action: none; width: 100%; max-width: 300px;
            border-radius: 4px; transition: border-color 0.2s ease;
        }
        #canvasInput:active { border-color: #007bff; }
        .btn-clear-sig { background: #6c757d; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: background 0.2s ease;}
        .btn-clear-sig:hover { background: #5a6268; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .btn-row { display: flex; gap: 12px; }
        .btn-action { color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; flex: 1; display: flex; justify-content: center; align-items: center; gap: 6px; transition: all 0.2s ease;}
        .btn-save { background: #28a745; box-shadow: 0 2px 6px rgba(40, 167, 69, 0.3); } 
        .btn-save:hover { background: #218838; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(40, 167, 69, 0.4); }
        .btn-download { background: #007bff; box-shadow: 0 2px 6px rgba(0, 123, 255, 0.3); } 
        .btn-download:hover { background: #0069d9; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0, 123, 255, 0.4); }
        .edit-badge { background: #17a2b8; color: white; padding: 6px 10px; border-radius: 6px; font-size: 12px; display: none; align-self: flex-start; margin-bottom: 10px; font-weight: 600;}
        
        /* Area Riwayat */
        .history-section {
            background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .history-section h3 { margin-top: 0; font-size: 16px; border-bottom: 2px solid #f0f0f0; padding-bottom: 12px; color: #333;}
        .history-list { list-style: none; padding: 0; margin: 0; max-height: 300px; overflow-y: auto; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        .history-list li { background: #f8f9fa; margin-bottom: 10px; padding: 12px; border-radius: 8px; border: 1px solid #eaeaea; display: flex; flex-direction: column; gap: 10px; transition: border-color 0.2s ease;}
        .history-list li:hover { border-color: #cbd5e1; }
        .history-info { font-size: 13px; color: #666; line-height: 1.4;}
        .history-info strong { display: block; font-size: 15px; color: #0056b3; margin-bottom: 3px;}
        .history-actions { display: flex; gap: 8px; justify-content: flex-end;}
        .btn-mini { padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; border: none; color: white; font-weight: bold; transition: all 0.2s ease;}
        .btn-edit { background: #ffc107; color: #212529; } .btn-edit:hover { background: #e0a800; }
        .btn-del { background: #dc3545; } .btn-del:hover { background: #c82333; }
        
        /* Area Kanan (Pratinjau) */
        .preview-section { 
            flex: 2; 
            width: 100%; 
            max-width: 100%; 
            overflow-x: auto; 
            position: relative; 
            border-radius: 12px;
            /* Scrollbar responsif untuk HP */
            padding-bottom: 10px; 
        }
        .preview-section::-webkit-scrollbar { height: 8px; }
        .preview-section::-webkit-scrollbar-thumb { background: #b0b0b0; border-radius: 4px; }
        
        .kwitansi-container { position: relative; width: 800px; display: inline-block; box-shadow: 0 8px 25px rgba(0,0,0,0.12); background: white; border-radius: 4px; overflow: hidden;}
        .kwitansi-container img { width: 100%; height: auto; display: block; }
        
        /* --- PENGATURAN FONT & LETAK MICRO-ADJUSTMENT --- */
        .overlay-text {
            position: absolute; 
            color: #222; 
            font-weight: bold !important; 
            font-family: 'Calibri', 'Arial', sans-serif !important; 
            transform: scaleY(1.15); 
            transform-origin: left bottom; 
        }
        
        #textNo { top: 9.5%; left: 25.2%; font-size: 18px; } 
        #textNama { top: 17.8%; left: 40.2%; width: 55%; font-size: 18px; }
        #textTerbilang { top: 27.5%; left: 40.2%; width: 55%; font-size: 18px; line-height: 1.95; } 
        #textUntuk { top: 36.3%; left: 40.2%; width: 53%; font-size: 18px; line-height: 1.95; } 
        #textNominal { top: 79.5%; left: 29.8%; font-size: 20px; font-weight: bold; }
        #textTanggal { top: 60.5%; left: 66.5%; width: 26%; font-size: 16px; text-align: center; transform-origin: center bottom; }
        #textPenerima { top: 85.5%; left: 66.5%; width: 26%; font-size: 16px; text-align: center; transform-origin: center bottom; }
        
        #canvasPratinjau {
            position: absolute; top: 65%; left: 70.5%; width: 18%; height: 20%; pointer-events: none;
        }

        /* --- CUSTOM MODAL POPUP --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(4px);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-box {
            background: white; padding: 30px 25px; border-radius: 16px; width: 90%; max-width: 380px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25); text-align: center; transform: translateY(30px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active { opacity: 1; display: flex; }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-msg { margin: 0 0 25px 0; font-size: 16px; color: #444; line-height: 1.6; }
        .modal-btns { display: flex; gap: 12px; justify-content: center; }
        .btn-modal { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; flex: 1; transition: all 0.2s ease;}
        .btn-modal-cancel { background: #e9ecef; color: #495057; } .btn-modal-cancel:hover { background: #dde2e6; }
        .btn-modal-ok { background: #0056b3; color: white; box-shadow: 0 2px 6px rgba(0, 86, 179, 0.3);} .btn-modal-ok:hover { background: #004494; }

        /* --- FOOTER MELAYANG --- */
        .floating-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            color: #555;
            text-align: center;
            padding: 15px 20px;
            font-size: 13px;
            font-weight: 500;
            border-top: 1px solid #eaeaea;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.06);
            z-index: 1000;
        }

        /* --- MEDIA QUERY KHUSUS HP --- */
        @media (max-width: 768px) {
            body { padding: 15px; padding-bottom: 90px; }
            .container { flex-direction: column; gap: 20px; }
            .left-panel, .preview-section { flex: none; width: 100%; }
            .btn-row { flex-direction: column; }
            
            /* --- EFEK TINTA TEBAL & NATURAL DI HP --- */
            .overlay-text {
                -webkit-text-stroke: 0.6px #222; /* Membuat tulisan menjadi tebal */
                text-shadow: 0px 0px 1.5px rgba(34, 34, 34, 0.4); /* Efek blur tipis layaknya tinta meresap/mbleber ke serat kertas */
                mix-blend-mode: multiply; /* Efek menyatukan warna font dengan tekstur background kwitansi */
                opacity: 0.92; /* Tinta tidak 100% solid karena terserap kertas */
            }
            
            #canvasPratinjau {
                mix-blend-mode: multiply; /* Efek tinta menyatu dengan kertas untuk tanda tangan */
                opacity: 0.92;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div class="form-section">
            <h2>Data Kwitansi <button class="btn-clear-all" onclick="clearAllFields()">🧹 Bersihkan</button></h2>
            <div id="editBadge" class="edit-badge">Sedang Mengedit Riwayat...</div>
            <form id="formKwitansi">
                <label>No:</label> <input type="text" id="inputNo" placeholder="2026070001">
                <label>Telah terima dari:</label> <input type="text" id="inputNama" placeholder="Mas Ferro">
                <label>Uang sejumlah (terbilang):</label> <textarea id="inputTerbilang" rows="2" placeholder="Lima Ratus Ribu Rupiah"></textarea>
                <label>Untuk pembayaran:</label> <textarea id="inputUntuk" rows="2" placeholder="Angsuran pengembalian pinjaman..."></textarea>
                <label>Nominal Rp:</label> <input type="text" id="inputNominal" placeholder="500.000,00">
                <label>Tempat, Tanggal:</label> <input type="text" id="inputTanggal" placeholder="Kediri, 19 Juli 2026">
                <label>Nama Penerima:</label> <input type="text" id="inputPenerima" placeholder="Augustinus Sigit Prasetyo">
                
                <label>Tanda Tangan:</label>
                <div class="signature-container">
                    <canvas id="canvasInput" width="300" height="150"></canvas>
                    <button type="button" class="btn-clear-sig" onclick="clearSignature()">Hapus Tanda Tangan</button>
                </div>
            </form>
            <div class="btn-group">
                <div class="btn-row">
                    <button type="button" class="btn-action btn-save" id="btnSaveRecord" onclick="saveToHistory()">💾 Simpan Riwayat</button>
                    <button type="button" class="btn-action btn-download" onclick="downloadHD()" id="btnDownload">📥 Download JPG</button>
                </div>
            </div>
        </div>

        <div class="history-section">
            <h3>Riwayat Tersimpan</h3>
            <ul id="historyList" class="history-list">
                <!-- Data Riwayat DB -->
            </ul>
        </div>
    </div>

    <div class="preview-section" id="previewSection">
        <div class="kwitansi-container" id="kwitansiTarget">
            <img src="1000325927.jpg" alt="Blank Kwitansi" id="kwitansiBg">
            
            <div id="textNo" class="overlay-text"></div>
            <div id="textNama" class="overlay-text"></div>
            <div id="textTerbilang" class="overlay-text"></div>
            <div id="textUntuk" class="overlay-text"></div>
            <div id="textNominal" class="overlay-text"></div>
            <div id="textTanggal" class="overlay-text"></div>
            <div id="textPenerima" class="overlay-text"></div>
            
            <canvas id="canvasPratinjau" width="300" height="150"></canvas>
        </div>
    </div>
</div>

<!-- Custom Modal UI -->
<div class="modal-overlay" id="customModal">
    <div class="modal-box">
        <p class="modal-msg" id="modalMsg">Pesan</p>
        <div class="modal-btns">
            <button class="btn-modal btn-modal-cancel" id="modalBtnCancel">Batal</button>
            <button class="btn-modal btn-modal-ok" id="modalBtnOk">OK</button>
        </div>
    </div>
</div>

<!-- Footer Melayang -->
<div class="floating-footer">
    &copy; 2026 Aplikasi Kwitansi Pro - Hak Cipta Dilindungi. Powered by Arta Fortuna.
</div>

<script>
    const fields = ['No', 'Nama', 'Terbilang', 'Untuk', 'Nominal', 'Tanggal', 'Penerima'];
    let editModeId = null;

    // --- CUSTOM MODAL LOGIC ---
    let modalCallback = null;
    const modal = document.getElementById('customModal');
    
    function showAppModal(message, isConfirm, callback) {
        document.getElementById('modalMsg').innerText = message;
        document.getElementById('modalBtnCancel').style.display = isConfirm ? 'block' : 'none';
        modalCallback = callback;
        modal.classList.add('active');
    }
    document.getElementById('modalBtnCancel').onclick = () => { modal.classList.remove('active'); };
    document.getElementById('modalBtnOk').onclick = () => { 
        modal.classList.remove('active'); 
        if(modalCallback) modalCallback(); 
    };

    // --- CANVAS TANDA TANGAN ---
    const cvsIn = document.getElementById('canvasInput');
    const ctxIn = cvsIn.getContext('2d');
    const cvsOut = document.getElementById('canvasPratinjau');
    const ctxOut = cvsOut.getContext('2d');

    ctxIn.lineWidth = 2; 
    ctxIn.lineCap = 'round';
    ctxIn.lineJoin = 'round';
    ctxIn.strokeStyle = '#000000';

    let isDrawing = false, lastX = 0, lastY = 0;

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault(); 
        let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        let clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        const rect = cvsIn.getBoundingClientRect();
        
        ctxIn.beginPath();
        ctxIn.moveTo(lastX, lastY);
        ctxIn.lineTo(clientX - rect.left, clientY - rect.top);
        ctxIn.stroke();
        
        lastX = clientX - rect.left; lastY = clientY - rect.top;

        ctxOut.clearRect(0, 0, cvsOut.width, cvsOut.height);
        ctxOut.drawImage(cvsIn, 0, 0);
    }

    function startDraw(e) {
        isDrawing = true;
        const rect = cvsIn.getBoundingClientRect();
        lastX = (e.type.includes('touch') ? e.touches[0].clientX : e.clientX) - rect.left;
        lastY = (e.type.includes('touch') ? e.touches[0].clientY : e.clientY) - rect.top;
    }

    function endDraw() { if(isDrawing) { isDrawing = false; autoSaveDraft(); } }

    cvsIn.addEventListener('mousedown', startDraw);
    cvsIn.addEventListener('mousemove', draw);
    cvsIn.addEventListener('mouseup', endDraw);
    cvsIn.addEventListener('mouseout', endDraw);
    cvsIn.addEventListener('touchstart', startDraw, {passive: false});
    cvsIn.addEventListener('touchmove', draw, {passive: false});
    cvsIn.addEventListener('touchend', endDraw);

    window.clearSignature = function() {
        ctxIn.clearRect(0, 0, cvsIn.width, cvsIn.height);
        ctxOut.clearRect(0, 0, cvsOut.width, cvsOut.height);
        autoSaveDraft();
    };

    function loadSignatureImage(dataURL) {
        ctxIn.clearRect(0, 0, cvsIn.width, cvsIn.height);
        ctxOut.clearRect(0, 0, cvsOut.width, cvsOut.height);
        if(!dataURL) return;
        const img = new Image();
        img.onload = () => { ctxIn.drawImage(img, 0, 0); ctxOut.drawImage(img, 0, 0); };
        img.src = dataURL;
    }

    // --- LOGIKA INPUT & FORM ---
    function updateField(id, value) {
        const inputEl = document.getElementById('input' + id);
        const textEl = document.getElementById('text' + id);
        if(inputEl) inputEl.value = value || '';
        if(textEl) textEl.innerText = value || '';
    }

    fields.forEach(id => {
        document.getElementById('input' + id).addEventListener('input', function() {
            document.getElementById('text' + id).innerText = this.value;
            autoSaveDraft();
        });
    });

    window.clearAllFields = function() {
        showAppModal("Yakin ingin mengosongkan semua isian form?", true, () => {
            fields.forEach(id => updateField(id, ''));
            clearSignature();
            cancelEditMode();
        });
    };

    function cancelEditMode() {
        editModeId = null;
        document.getElementById('editBadge').style.display = 'none';
        document.getElementById('btnSaveRecord').innerHTML = '💾 Simpan Riwayat';
    }

    // --- INDEXED DB ---
    let db;
    const request = indexedDB.open("KwitansiAppDB", 1);

    request.onupgradeneeded = function(event) {
        db = event.target.result;
        if (!db.objectStoreNames.contains("draft")) db.createObjectStore("draft", { keyPath: "id" });
        if (!db.objectStoreNames.contains("riwayat")) db.createObjectStore("riwayat", { keyPath: "id", autoIncrement: true });
    };

    request.onsuccess = function(event) {
        db = event.target.result;
        loadDraft(); 
        loadHistoryList(); 
    };

    function autoSaveDraft() {
        if (!db) return;
        const data = { id: 'current', signature: cvsIn.toDataURL() };
        fields.forEach(id => { data[id] = document.getElementById('input' + id).value; });
        db.transaction(["draft"], "readwrite").objectStore("draft").put(data);
    }

    function loadDraft() {
        if (!db) return;
        const req = db.transaction(["draft"], "readonly").objectStore("draft").get('current');
        req.onsuccess = function(e) {
            const data = e.target.result;
            if (data) {
                fields.forEach(id => updateField(id, data[id]));
                loadSignatureImage(data.signature);
            }
        };
    }

    window.saveToHistory = function() {
        if (!db) return;
        const nama = document.getElementById('inputNama').value;
        const nominal = document.getElementById('inputNominal').value;
        
        if(!nama && !nominal) {
            showAppModal("Isi minimal Nama Pembayar atau Nominal untuk menyimpan riwayat.", false, null);
            return;
        }

        const data = { 
            tanggal_simpan: new Date().toLocaleString('id-ID'),
            signature: cvsIn.toDataURL() 
        };
        fields.forEach(id => { data[id] = document.getElementById('input' + id).value; });

        const tx = db.transaction(["riwayat"], "readwrite");
        const store = tx.objectStore("riwayat");

        if (editModeId) {
            data.id = editModeId;
            store.put(data);
        } else {
            store.add(data);
        }

        tx.oncomplete = function() {
            showAppModal(editModeId ? "Perubahan riwayat berhasil disimpan!" : "Kwitansi baru berhasil disimpan ke Riwayat!", false, () => {
                cancelEditMode();
                loadHistoryList();
            });
        };
    };

    function loadHistoryList() {
        if (!db) return;
        const listUl = document.getElementById('historyList');
        listUl.innerHTML = ''; 

        const store = db.transaction(["riwayat"], "readonly").objectStore("riwayat");
        const req = store.openCursor(null, "prev"); 

        req.onsuccess = function(e) {
            const cursor = e.target.result;
            if (cursor) {
                const data = cursor.value;
                const itemId = cursor.primaryKey; 
                
                const li = document.createElement('li');
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'history-info';
                infoDiv.innerHTML = `<strong>${data.Nama || 'Tanpa Nama'} - Rp ${data.Nominal || '0'}</strong> Tgl: ${data.tanggal_simpan}`;

                const actionDiv = document.createElement('div');
                actionDiv.className = 'history-actions';

                const editBtn = document.createElement('button');
                editBtn.className = 'btn-mini btn-edit';
                editBtn.innerText = '✏️ Edit';
                editBtn.onclick = () => loadHistoryForEdit(data, itemId);

                const delBtn = document.createElement('button');
                delBtn.className = 'btn-mini btn-del';
                delBtn.innerText = '🗑️ Hapus';
                delBtn.onclick = () => deleteHistoryItem(itemId);

                actionDiv.appendChild(editBtn);
                actionDiv.appendChild(delBtn);
                li.appendChild(infoDiv);
                li.appendChild(actionDiv);
                listUl.appendChild(li);
                
                cursor.continue();
            } else if (listUl.innerHTML === '') {
                listUl.innerHTML = '<li style="color:#777; text-align:center; padding: 20px 0;">Belum ada riwayat tersimpan</li>';
            }
        };
    }

    function loadHistoryForEdit(data, id) {
        showAppModal("Muat data ini ke form? Isian Anda saat ini akan tertimpa.", true, () => {
            fields.forEach(fid => updateField(fid, data[fid]));
            loadSignatureImage(data.signature);
            autoSaveDraft(); 
            
            editModeId = id;
            document.getElementById('editBadge').style.display = 'block';
            document.getElementById('btnSaveRecord').innerHTML = '💾 Simpan Perubahan';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    function deleteHistoryItem(id) {
        showAppModal("Yakin ingin menghapus riwayat kwitansi ini permanen?", true, () => {
            const tx = db.transaction(["riwayat"], "readwrite");
            tx.objectStore("riwayat").delete(id);
            tx.oncomplete = function() { loadHistoryList(); };
        });
    }

    // --- FITUR DOWNLOAD JPG HD ---
    window.downloadHD = function() {
        const btn = document.getElementById('btnDownload');
        const originalText = btn.innerHTML;
        btn.innerHTML = '⏳ Memproses...';
        btn.disabled = true;

        const targetEl = document.getElementById('kwitansiTarget');
        
        html2canvas(targetEl, { 
            scale: 3, 
            useCORS: true, 
            backgroundColor: null 
        }).then(canvas => {
            const link = document.createElement('a');
            const noKwitansi = document.getElementById('inputNo').value || 'TanpaNomor';
            link.download = `Kwitansi_${noKwitansi}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 1.0); 
            link.click();
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        }).catch(err => {
            console.error(err);
            showAppModal("Gagal mengekspor gambar.", false, null);
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
    }

    // --- REGISTRASI SERVICE WORKER UNTUK PWA ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
            .then(registration => {
                console.log('Service Worker berhasil didaftarkan dengan scope:', registration.scope);
            })
            .catch(err => {
                console.log('Pendaftaran Service Worker gagal:', err);
            });
        });
    }
</script>
